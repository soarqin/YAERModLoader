; YAFSML 配置模板
; 布尔值支持：true、yes、on 或 1。其他值均视为 false。

; 未使用 --launch-target 时，独立启动器选择的游戏。
; 可用值包括：eldenring、sekiro、darksouls3 及其别名。
game=eldenring

; 显示调试控制台。
debug=0

; 最低日志级别：trace、debug、info、warn、error 或 off。
log_level=info

; Elden Ring CPU 亲和性策略。其他游戏当前忽略此选项。
;  0 = 默认（所有逻辑核）
;  1 = 除第一个逻辑核之外的所有逻辑核
;  2 = 所有能效核（Intel 第 12 代及更高版本）
;  3 = 所有性能核（Intel 第 12 代及更高版本）
;  4 = 除第一个逻辑核之外的所有性能核
cpu_affinity=0

; 为需要 CJK 文本输入的模组保持 IME 启用。
enable_ime=0

; Elden Ring 设置。运行 eldenring.exe 时自动选择此 section。
[elden_ring]
; 跳过开场 Logo。
skip_intro=1

; 阻止原始、修改后或过大的 regulation.bin 数据写入存档。
prevent_regulation_save_write=1

; 使用基于 mimalloc 的 Dantelion 分配器。
patch_mem=1

; mimalloc 专用堆大小，单位为 MB。0 使用默认的 12288 MB 堆。
patch_mem_heap_size=0

; 作为 patch_mem 的一部分 Hook CSGraphicsImp。
patch_mem_hook_cs_graphics=1

; 缓存解密后的 BHD 标头，减少归档启动时间。
boot_boost=1

; 替换存档文件名 (ER0000.sl2)。以点号开头时只替换扩展名，例如 .abc 会生成
; ER0000.abc。留空表示禁用。
replace_save_filename=

; 替换 Seamless Co-op 使用的 ER0000.co2 文件名。以点号开头时只替换扩展名。
; 留空表示禁用。
replace_seamless_coop_save_filename=

; Sekiro: Shadows Die Twice 设置。运行 sekiro.exe 时自动选择此 section。
[sekiro]
; 跳过开场 Logo。
skip_intro=1

; 阻止原始、修改后或过大的 regulation 数据写入存档。
prevent_regulation_save_write=1

; 使用基于 mimalloc 的 Dantelion 分配器。
patch_mem=1

; mimalloc 专用堆大小，单位为 MB。0 使用默认堆大小。
patch_mem_heap_size=0

; 缓存解密后的 BHD 标头，减少归档启动时间。
boot_boost=1

; 替换存档文件名 (S0000.sl2)。以点号开头时只替换扩展名，留空表示禁用。
replace_save_filename=
replace_seamless_coop_save_filename=

; Dark Souls III 实验性支持。dearxan 不是必要条件且暂未安排；Hook 可用性仍取决于游戏版本。
[darksouls3]
; 跳过开场 Logo。
skip_intro=1
; 阻止修改后的 regulation 数据写入存档。
prevent_regulation_save_write=1
; 使用基于 mimalloc 的 Dantelion 分配器。
patch_mem=1
; mimalloc 专用堆大小，单位为 MB。0 使用默认堆大小。
patch_mem_heap_size=0
; Dark Souls III 不使用 Elden Ring 的 CSGraphicsImp Hook。
patch_mem_hook_cs_graphics=0
; 缓存解密后的 BHD 标头，减少归档启动时间。
boot_boost=1
; 替换存档文件名 (DS30000.sl2)。以点号开头时只替换扩展名，留空表示禁用。
replace_save_filename=
; Seamless Co-op 存档替换仅适用于 Elden Ring。
replace_seamless_coop_save_filename=

; 游戏启动时加载的外部 DLL。
; 路径可以是相对于配置文件的路径，也可以是绝对路径。
; 未设置条件时，DLL 会在 SteamAPI_Init 之后加载。
; 可用条件：
;   - early
;   - delay,毫秒数
;   - after,名称。
[dlls]
;seamlesscoop=SeamlessCoop/ersc.dll
;early_native=native1.dll|early
;delay_native=native2.dll|delay,5000
;after_native=native3.dll|after,delay_native

; 扫描并覆盖游戏数据的模组目录。
; 后声明的模组覆盖先声明的模组中的同名文件。
; 路径可以是相对路径或绝对路径。
[mods]
;mod1=mod
;mod2=C:\mymods\some_mod
