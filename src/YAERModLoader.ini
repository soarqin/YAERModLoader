; YAERModLoader configuration
; Boolean values accept: true, yes, on, or 1. Any other value is false.

; Show a debug console.
debug=0

; Minimum log level: trace, debug, info, warn, error, or off.
log_level=info

; Elden Ring CPU affinity strategy. Other games currently ignore this option.
;  0 = default (all logical cores)
;  1 = all logical cores except the first
;  2 = all efficient cores (Intel 12th gen and newer)
;  3 = all performance cores (Intel 12th gen and newer)
;  4 = all performance cores except the first logical core
cpu_affinity=0

; Reset Elden Ring achievements when a new game starts.
reset_achievements_on_new_game=0

; Keep IME enabled for mods that require CJK text input.
enable_ime=0

; Settings for Elden Ring. This section is selected automatically when
; eldenring.exe is running.
[elden_ring]
; Skip the intro logo.
skip_intro=1

; Prevent raw modded or oversized regulation.bin data from being written to saves.
prevent_regulation_save_write=1

; Replace the Dantelion allocator with mimalloc.
patch_mem=1

; Dedicated mimalloc heap size in MB. 0 uses the default 12288 MB heap.
patch_mem_heap_size=0

; Hook CSGraphicsImp as part of patch_mem. Set to 0 if exit-time Dantelion
; compatibility is more important than this hook.
patch_mem_hook_cs_graphics=1

; Cache decrypted BHD headers to reduce archive startup time.
boot_boost=1

; Replace the ER0000.sl2 filename. A leading dot replaces only the extension,
; for example, .abc produces ER0000.abc. Empty text disables the feature.
replace_save_filename=

; Replace the ER0000.co2 filename used by Seamless Co-op. A leading dot
; replaces only the extension. Empty text disables the feature.
replace_seamless_coop_save_filename=

; Settings for Sekiro: Shadows Die Twice. This section is selected
; automatically when sekiro.exe is running.
[sekiro]
; Skip the intro logo.
skip_intro=1

; Prevent raw modded or oversized regulation data from being written to saves.
prevent_regulation_save_write=1

; Replace the Dantelion allocator with mimalloc.
patch_mem=1

; Dedicated mimalloc heap size in MB. 0 uses the default heap size.
patch_mem_heap_size=0

; Keep the allocator's optional CSGraphicsImp hook disabled for Sekiro.
patch_mem_hook_cs_graphics=0

replace_seamless_coop_save_filename=

; Cache decrypted BHD headers to reduce archive startup time.
boot_boost=1

; Replace the save filename. A leading dot replaces only the extension.
; Empty text disables the feature.
replace_save_filename=

; Experimental Dark Souls III support. Arxan neutralization is not included;
; hook availability depends on the installed game build.
[darksouls3]
; Skip the intro logo.
skip_intro=1
; Prevent modded regulation data from being written to saves.
prevent_regulation_save_write=1
; Replace the Dantelion allocator with mimalloc.
patch_mem=1
; Dedicated mimalloc heap size in MB. 0 uses the default heap size.
patch_mem_heap_size=0
; Dark Souls III does not use the Elden Ring CSGraphicsImp hook.
patch_mem_hook_cs_graphics=0
; Cache decrypted BHD headers to reduce archive startup time.
boot_boost=1
; Replace the save filename. A leading dot replaces only the extension.
replace_save_filename=
; Seamless Co-op save replacement is Elden Ring-only.
replace_seamless_coop_save_filename=

; External DLLs to load when the game starts.
; Paths may be relative to this configuration file or absolute.
[dlls]
;seamlesscoop=SeamlessCoop/ersc.dll

; Mod directories to scan and override game data.
; Later entries override earlier entries when they contain the same file.
; Paths may be relative to this configuration file or absolute.
[mods]
;mod1=mod
;mod2=C:\mymods\some_mod
