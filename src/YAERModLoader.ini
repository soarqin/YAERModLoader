; Set to 1 to show console with some debug output
debug=0

; Minimum console log level: trace, debug, info, warn, error, or off
log_level=info

; Set CPU affinity strategy
;  0 = default (all cores)
;  1 = except 1st logical core
;  (following options only work on Intel 12th gen and newer)
;  2 = all efficient cores
;  3 = all performance cores
;  4 = all performance cores w/o 1st logical core
cpu_affinity=0

; Reset achievements on new game starts, this is useful for all-achievement speedruns
reset_achievements_on_new_game=0

; Set to 1 to enable IME in the game, this is useful for CJK text input in certain mods
enable_ime=0

; Settings for ELDEN RING
[elden_ring]
; Set to 1 to skip the intro screen
skip_intro=1

; Set to 1 to remove chromatic aberration
remove_chromatic_aberration=0

; Set to 1 to remove vignette
remove_vignette=0

; Disable mouse camera control
;  0 = default
;disable_mouse_camera_control=0

; Prevent raw modded/oversized regulation.bin data from being written into saves
prevent_regulation_save_write=1

; Use mimalloc as the Dantelion allocator backend; set to 0 if compatibility issues occur
patch_mem=1

; Dedicated mimalloc heap size in MB. Set to 0 to use the Elden Ring default (12288 MB).
patch_mem_heap_size=0

; Hook CSGraphicsImp as part of patch_mem. Set to 0 if the known exit-time Dantelion panic is undesirable.
patch_mem_hook_cs_graphics=1

; Cache decrypted BHD headers to reduce startup time. Set to 0 when diagnosing archive compatibility issues.
boot_boost=1

; Replace save filename with certain text.
;  You can set it to extension only by leading dot, e.g. ".abc"
;  Empty text means no replacement.
;replace_save_filename=

; Replace Seamless-Coop save filename with certain text.
;  You can set it to extension only by leading dot, e.g. ".abc"
;  Empty text means no replacement.
;replace_seamless_coop_save_filename=

; dlls to load on game start
;  format: name=path_to_dll
; can use either relative or absolute paths
;  NOTE: er_param must be listed before dlls that depend on the param API
;        (itemlot_rate, autoloot, and any param-consuming extension).
[dlls]
;er_param=dll/er_param.dll
;almighty_kale=dll/almighty_kale.dll
;itemlot_rate=dll/itemlot_rate.dll
;autoloot=dll/autoloot.dll
;no_dup_loot=dll/no_dup_loot.dll
;seamlesscoop=SeamlessCoop/ersc.dll

; mods to override game data
;  format: name=path_to_mod
; can use either relative or absolute paths
[mods]
;mod1=mod
;mod2=C:\mymods\some_mod
