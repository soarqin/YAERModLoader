; YAERModLoader 配置模板
; 布尔值支持：true、yes、on 或 1。其他值均视为 false。

; 显示调试控制台。
debug=0

; 最低日志级别：trace、debug、info、warn、error 或 off。
log_level=info

; Elden Ring CPU 亲和性策略。其他游戏当前忽略此选项。
;  0 = 默认（所有逻辑核）
;  1 = 除第一个逻辑核之外的所有逻辑核
;  2 = 所有能效核（Intel 第 12 代及更高版本）
;  3 = 所有性能核（Intel 第 12 代及更高版本）
;  4 = 除第一个逻辑核之外的所有性能核
cpu_affinity=0

; Elden Ring 开始新游戏时重置成就。
reset_achievements_on_new_game=0

; 为需要 CJK 文本输入的模组保持 IME 启用。
enable_ime=0

; Elden Ring 设置。运行 eldenring.exe 时自动选择此 section。
[elden_ring]
; 跳过开场 Logo。
skip_intro=1

; 移除色差。
remove_chromatic_aberration=0

; 移除暗角效果。
remove_vignette=0

; 禁用鼠标控制镜头。
disable_mouse_camera_control=0

; 阻止原始、修改后或过大的 regulation.bin 数据写入存档。
prevent_regulation_save_write=1

; 使用基于 mimalloc 的 Dantelion 分配器。
patch_mem=1

; mimalloc 专用堆大小，单位为 MB。0 使用默认的 12288 MB 堆。
patch_mem_heap_size=0

; 作为 patch_mem 的一部分 Hook CSGraphicsImp。
patch_mem_hook_cs_graphics=1

; 缓存解密后的 BHD 标头，减少归档启动时间。
boot_boost=1

; 替换 ER0000.sl2 文件名。以点号开头时只替换扩展名，例如 .abc 会生成
; ER0000.abc。留空表示禁用。
replace_save_filename=

; 替换 Seamless Co-op 使用的 ER0000.co2 文件名。以点号开头时只替换扩展名。
; 留空表示禁用。
replace_seamless_coop_save_filename=

; Sekiro: Shadows Die Twice 设置。运行 sekiro.exe 时自动选择此 section。
[sekiro]
; 跳过开场 Logo。
skip_intro=1

; 阻止原始、修改后或过大的 regulation 数据写入存档。
prevent_regulation_save_write=1

; 使用基于 mimalloc 的 Dantelion 分配器。
patch_mem=1

; mimalloc 专用堆大小，单位为 MB。0 使用默认堆大小。
patch_mem_heap_size=0

; Sekiro 不使用可选的 CSGraphicsImp Hook。
patch_mem_hook_cs_graphics=0

; 缓存解密后的 BHD 标头，减少归档启动时间。
boot_boost=1

; 替换存档文件名。以点号开头时只替换扩展名，留空表示禁用。
replace_save_filename=

; 以下 Elden Ring 专用选项保留在共享模板中，以保持结构一致；Sekiro 会忽略它们。
remove_chromatic_aberration=0
remove_vignette=0
disable_mouse_camera_control=0
replace_seamless_coop_save_filename=

; Dark Souls III 实验性注册目标设置。游戏专用 Hook 尚未启用；此 section
; 仅用于保持共享配置模板完整。
[darksouls3]
skip_intro=1
prevent_regulation_save_write=1
patch_mem=1
patch_mem_heap_size=0
patch_mem_hook_cs_graphics=0
boot_boost=1
replace_save_filename=
remove_chromatic_aberration=0
remove_vignette=0
disable_mouse_camera_control=0
replace_seamless_coop_save_filename=

; 游戏启动时加载的外部 DLL。
; 路径可以是相对于配置文件的路径，也可以是绝对路径。
; er_param 必须列在使用其 API 的扩展之前。
[dlls]
;er_param=dll/er_param.dll
;almighty_kale=dll/almighty_kale.dll
;itemlot_rate=dll/itemlot_rate.dll
;autoloot=dll/autoloot.dll
;no_dup_loot=dll/no_dup_loot.dll
;seamlesscoop=SeamlessCoop/ersc.dll

; 扫描并覆盖游戏数据的模组目录。
; 后声明的模组覆盖先声明的模组中的同名文件。
; 路径可以是相对路径或绝对路径。
[mods]
;mod1=mod
;mod2=C:\mymods\some_mod
