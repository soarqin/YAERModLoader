; 设为1以显示带有一些调试输出的控制台
debug=0

; 设置CPU亲和性策略
;  0 = 默认（使用所有核）
;  1 = 除了第一个逻辑核
;  （以下选项仅适用于英特尔第12代及更高版本）
;  2 = 所有能效核
;  3 = 所有性能核
;  4 = 所有性能核除了第一个逻辑核
cpu_affinity=0

; 在新游戏开始时自动重置成就，这对全成就速通很有用
reset_achievements_on_new_game=0

; 设置为1以在游戏中启用IME，在某些mod中需要输入CJK文本时很有用
enable_ime=0

; 艾尔登法环的补丁
[elden_ring]
; 设置为1以跳过引导LOGO
skip_intro=1

; 设置为1以去除色差效果
remove_chromatic_aberration=0

; 设置为1以去除暗角效果
remove_vignette=0

; 禁用鼠标控制视角
;  默认为0
;disable_mouse_camera_control=0

; 防止将 modded/过大的 regulation.bin 原始数据写入存档
prevent_regulation_save_write=1

; 使用 mimalloc 替换 Dantelion 分配器；如遇兼容问题可设为0
patch_mem=1

; mimalloc 专用堆大小，单位为 MB。设为0时使用艾尔登法环默认值（12288 MB）。
patch_mem_heap_size=0

; patch_mem 中的 CSGraphicsImp hook。若不希望游戏退出时出现已知 Dantelion panic，可设为0。
patch_mem_hook_cs_graphics=1

; 替换游戏存档文件名
;  你可以设置为扩展名，例如".abc"
;  空文本表示不替换
;replace_save_filename=

; 替换无缝联机游戏存档文件名
;  你可以设置为扩展名，例如".abc"
;  空文本表示不替换
;replace_seamless_coop_save_filename=

; 游戏启动时加载的dll
;  格式：名称=dll路径
; 可以使用相对路径或绝对路径
;  注意：er_param 必须列在依赖 param 接口的 dll 之前
;        （itemlot_rate、autoloot 及任何使用 param 的扩展）。
[dlls]
;er_param=dll/er_param.dll
;itemlot_rate=dll/itemlot_rate.dll
;autoloot=dll/autoloot.dll
;no_dup_loot=dll/no_dup_loot.dll
;seamlesscoop=SeamlessCoop/ersc.dll

; 加载的mod，mod目录内的文件会覆盖游戏数据
;  格式：名称=mod路径
; 可以使用相对路径或绝对路径
[mods]
;mod1=mod
;mod2=C:\mymods\some_mod
