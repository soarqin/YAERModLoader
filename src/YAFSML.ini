; YAFSML configuration
; Boolean values accept: true, yes, on, or 1. Any other value is false.

; Game selected by the standalone launcher when --launch-target is not used.
; Accepted values include: eldenring, sekiro, darksouls3, and their aliases.
game=eldenring


; Common patches for games
[patch]
; Skip the intro logo.
skip_intro=1

; Prevent raw modded or oversized regulation.bin data from being written to saves.
prevent_regulation_save_write=1

; Replace the Dantelion allocator with mimalloc.
patch_mem=1

; Dedicated mimalloc heap size in MB. 0 uses the default 12288 MB heap.
patch_mem_heap_size=0

; Cache decrypted BHD headers to reduce archive startup time.
boot_boost=1

; Save filename mappings apply to the selected game. A leading dot replaces only
; the source filename extension; empty text disables each mapping.
replace_save_filename=
replace_seamless_coop_save_filename=

; Keep IME enabled for mods that require non-Latin text input.
enable_ime=0


; Common tweaks for games
[tweak]
; CPU affinity strategy for the game process.
;  0 = default (all logical cores)
;  1 = all logical cores except the first
;  2 = all efficient cores (Intel 12th gen and newer)
;  3 = all performance cores (Intel 12th gen and newer)
;  4 = all performance cores except the first logical core
; WARNING: do not use 2 / 3 / 4 for Intel Ultra series CPU on ELDEN RING 1.16.2 or higher!
cpu_affinity=0


; Log settings
[log]
; Show a debug console for logging.
console=0

; log to file
log_file=0

; Minimum log level: trace, debug, info, warn, error, or off.
log_level=warn


; External DLLs to load when the game starts.
; Paths may be relative to this configuration file or absolute.
; Without conditions, entries load after SteamAPI_Init.
; Conditions:
;   - early
;   - delay,milliseconds
;   - after,name
[dll]
;seamlesscoop=SeamlessCoop/ersc.dll
;early_native=native1.dll|early
;delay_native=native2.dll|delay,5000
;after_native=native3.dll|after,delay_native


; Mod directories to scan and override game data.
; Later entries override earlier entries when they contain the same file.
; Paths may be relative to this configuration file or absolute.
[mod]
;mod1=mod
;mod2=C:\mymods\some_mod
